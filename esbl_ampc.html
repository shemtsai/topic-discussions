<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacy Wheel of Knowledge</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f7f9fc;
    margin: 0;
    padding: 0;
  }
  header {
    background: #0052cc;
    color: white;
    text-align: center;
    padding: 1rem;
  }
  main {
    padding: 1rem;
    max-width: 900px;
    margin: auto;
  }
  select, button {
    margin: 0.5rem 0;
    padding: 0.5rem;
    font-size: 1rem;
  }
  .question-card {
    border: 1px solid #ccc;
    background: white;
    padding: 1rem;
    margin-top: 1rem;
    border-radius: 8px;
  }
  .answer {
    display: none;
    margin-top: 0.5rem;
    background: #e6f0ff;
    padding: 0.5rem;
    border-radius: 5px;
  }
  .score {
    font-weight: bold;
    margin-top: 1rem;
    font-size: 1.2rem;
  }
  .reveal-btn {
    margin-top: 0.5rem;
  }
</style>
</head>
<body>

<header>
  <h1>Pharmacy Wheel of Knowledge</h1>
  <p>Test your antimicrobial stewardship & microbiology knowledge!</p>
</header>

<main>
  <label for="category">Select Category:</label>
  <select id="category">
    <option value="All">All</option>
  </select>

  <label for="difficulty">Select Difficulty:</label>
  <select id="difficulty">
    <option value="All">All</option>
  </select>

  <button onclick="loadQuestions()">Load Questions</button>

  <div id="questions-container"></div>

  <div class="score">Score: <span id="score">0</span></div>
</main>

<script>
// Question Data
const questions = [
  {
    category: "Resistance Mechanisms",
    difficulty: "PGY1",
    question: "What is the key phenotypic difference that distinguishes AmpC β-lactamases from ESBLs in terms of susceptibility to β-lactamase inhibitors?",
    answer: "AmpC β-lactamases are NOT inhibited by clavulanic acid or tazobactam, whereas ESBLs ARE inhibited by these β-lactamase inhibitors. AmpC enzymes also resist cephamycins (e.g., cefoxitin), unlike ESBLs.",
    references: "Macesic et al., Lancet 2025; IDSA 2023/2024 Guidance"
  },
  {
    category: "Clinical Trials",
    difficulty: "PGY1",
    question: "In the MERINO trial comparing piperacillin-tazobactam to meropenem for ESBL-producing Enterobacterales bloodstream infections, which agent had lower 30-day mortality?",
    answer: "Meropenem (4% mortality vs 12% with piperacillin-tazobactam)",
    references: "IDSA 2023 Guidance on AMR Gram-Negative Infections"
  },
  {
    category: "Organism Identification",
    difficulty: "PGY1",
    question: "Name three Enterobacterales species that are at MODERATE to HIGH risk for clinically significant AmpC production due to inducible ampC gene expression.",
    answer: "Enterobacter cloacae complex, Klebsiella aerogenes, and Citrobacter freundii",
    references: "IDSA 2023/2024 Guidance; Macesic et al., Lancet 2025"
  },
  {
    category: "Pharmacology",
    difficulty: "PGY1",
    question: "Why is cefepime generally effective against AmpC-producing Enterobacterales despite their resistance to third-generation cephalosporins?",
    answer: "Cefepime is both a weak inducer of ampC AND forms stable acyl enzyme complexes that resist hydrolysis by AmpC β-lactamases.",
    references: "IDSA 2024 Guidance on AMR Gram-Negative Infections"
  },
  // Add more questions here following the same format...
];

// Populate dropdowns
const categorySelect = document.getElementById("category");
const difficultySelect = document.getElementById("difficulty");

const categories = [...new Set(questions.map(q => q.category))];
categories.forEach(cat => {
  const option = document.createElement("option");
  option.value = cat;
  option.textContent = cat;
  categorySelect.appendChild(option);
});

const difficulties = [...new Set(questions.map(q => q.difficulty))];
difficulties.forEach(diff => {
  const option = document.createElement("option");
  option.value = diff;
  option.textContent = diff;
  difficultySelect.appendChild(option);
});

let score = 0;

// Load Questions
function loadQuestions() {
  const selectedCategory = categorySelect.value;
  const selectedDifficulty = difficultySelect.value;
  const container = document.getElementById("questions-container");
  container.innerHTML = "";

  const filteredQuestions = questions.filter(q => 
    (selectedCategory === "All" || q.category === selectedCategory) &&
    (selectedDifficulty === "All" || q.difficulty === selectedDifficulty)
  );

  filteredQuestions.forEach((q, index) => {
    const card = document.createElement("div");
    card.className = "question-card";
    card.innerHTML = `
      <strong>Q${index + 1} (${q.category})</strong>: ${q.question}
      <button class="reveal-btn" onclick="revealAnswer(${index})">Reveal Answer</button>
      <div class="answer" id="answer-${index}">
        ${q.answer}<br><em>References: ${q.references}</em>
      </div>
    `;
    container.appendChild(card);
  });
}

// Reveal Answer
function revealAnswer(index) {
  const answerDiv = document.getElementById(`answer-${index}`);
  if (answerDiv.style.display === "none" || answerDiv.style.display === "") {
    answerDiv.style.display = "block";
    score += 1;
    document.getElementById("score").textContent = score;
  }
}
</script>

</body>
</html>
