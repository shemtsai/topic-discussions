<script>
document.addEventListener("DOMContentLoaded", function () {

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 400;

const questions = [
  {category:"Category 1"},
  {category:"Category 2"},
  {category:"Category 3"},
  {category:"Category 4"},
  {category:"Category 5"}
];

function drawWheel() {

  const slices = questions.length;
  const sliceAngle = 2 * Math.PI / slices;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < slices; i++) {

    ctx.beginPath();
    ctx.moveTo(200, 200);
    ctx.arc(200, 200, 200, i * sliceAngle, (i + 1) * sliceAngle);

    ctx.fillStyle = i % 2 === 0 ? "#1a73e8" : "#66a3ff";
    ctx.fill();
    ctx.stroke();

    ctx.save();
    ctx.translate(200, 200);
    ctx.rotate((i + 0.5) * sliceAngle);

    ctx.textAlign = "right";
    ctx.fillStyle = "white";
    ctx.font = "bold 14px Arial";

    ctx.fillText(questions[i].category, 190, 0);

    ctx.restore();
  }
}

drawWheel();

});
</script>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel of Knowledge 1v1</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background:#f0f4f8; margin:0; padding:0; text-align:center; }
header { background:#1a73e8; color:white; padding:1rem; }
header h1 { margin:0; font-size:2rem; }
main { padding:1rem; max-width:800px; margin:auto; }
select, button { margin:0.5rem; padding:0.6rem 1rem; font-size:1rem; border-radius:5px; border:1px solid #ccc; cursor:pointer; }
button:hover { background:#1a73e8; color:white; border-color:#1a73e8; }
#wheel-container { margin:2rem auto; position: relative; width:400px; height:400px; }
#wheel { width:100%; height:100%; border-radius:50%; border:5px solid #1a73e8; box-shadow:0 0 15px rgba(0,0,0,0.2); transition: transform 5s cubic-bezier(0.33,1,0.68,1); }
#pointer { position:absolute; top:-10px; left:50%; width:0; height:0; border-left:15px solid transparent; border-right:15px solid transparent; border-bottom:30px solid red; transform:translateX(-50%); z-index:2; }
.question-card { border:1px solid #ccc; background:white; padding:1rem; margin-top:1rem; border-radius:8px; text-align:left; }
.answer { display:none; margin-top:0.5rem; background:#e6f0ff; padding:0.5rem; border-radius:5px; }
.scoreboard { display:flex; justify-content:center; gap:3rem; margin-top:1rem; font-size:1.2rem; }
.turn { margin-top:1rem; font-size:1.2rem; font-weight:bold; color:#d32f2f; }
</style>
</head>
<body>

<header>
  <h1>Wheel of Knowledge: 1v1 Pharmacy Challenge</h1>
  <p>Spin, answer, and outscore your opponent!</p>
</header>

<main>
  <div id="wheel-container">
    <div id="pointer"></div>
    <canvas id="wheel"></canvas>
  </div>
  <button onclick="spinWheel()">Spin the Wheel!</button>

  <div class="turn" id="turnIndicator">Player 1's Turn</div>
  <div id="question-container"></div>
  
  <div class="scoreboard">
    <div>Player 1 Score: <span id="score1">0</span></div>
    <div>Player 2 Score: <span id="score2">0</span></div>
  </div>
</main>

<script>
// Questions array (all 25 questions)
const questions = [
  { category:"Resistance Mechanisms", difficulty:"PGY1", question:"What is the key phenotypic difference that distinguishes AmpC β-lactamases from ESBLs in terms of susceptibility to β-lactamase inhibitors?", answer:"AmpC β-lactamases are NOT inhibited by clavulanic acid or tazobactam, whereas ESBLs ARE inhibited by these β-lactamase inhibitors. AmpC enzymes also resist cephamycins (e.g., cefoxitin), unlike ESBLs.", references:"Macesic et al., Lancet 2025; IDSA 2023/2024 Guidance" },
  { category:"Clinical Trials", difficulty:"PGY1", question:"In the MERINO trial comparing piperacillin-tazobactam to meropenem for ESBL-producing Enterobacterales bloodstream infections, which agent had lower 30-day mortality?", answer:"Meropenem (4% mortality vs 12% with piperacillin-tazobactam)", references:"IDSA 2023 Guidance on AMR Gram-Negative Infections" },
  { category:"Organism Identification", difficulty:"PGY1", question:"Name three Enterobacterales species that are at MODERATE to HIGH risk for clinically significant AmpC production due to inducible ampC gene expression.", answer:"Enterobacter cloacae complex, Klebsiella aerogenes, and Citrobacter freundii", references:"IDSA 2023/2024 Guidance; Macesic et al., Lancet 2025" },
  { category:"Pharmacology", difficulty:"PGY1", question:"Why is cefepime generally effective against AmpC-producing Enterobacterales despite their resistance to third-generation cephalosporins?", answer:"Cefepime is both a weak inducer of ampC AND forms stable acyl enzyme complexes that resist hydrolysis by AmpC β-lactamases.", references:"IDSA 2024 Guidance on AMR Gram-Negative Infections" },
  { category:"Antimicrobial Stewardship", difficulty:"PGY1", question:"For ESBL-producing E. coli urinary tract infections, what are three preferred oral step-down options after clinical improvement (assuming susceptibility)?", answer:"Trimethoprim-sulfamethoxazole (TMP-SMX), ciprofloxacin, or levofloxacin", references:"IDSA 2023/2024 Guidance on AMR Gram-Negative Infections" },
  { category:"Resistance Mechanisms", difficulty:"PGY1", question:"What are the three mechanisms by which Enterobacterales can exhibit increased AmpC β-lactamase production?", answer:"(1) Inducible chromosomal gene expression, (2) Stable chromosomal gene derepression, (3) Constitutively expressed ampC genes (plasmid-mediated or chromosomally integrated)", references:"IDSA 2023/2024 Guidance on AMR Gram-Negative Infections" },
  { category:"Drug Spectrum", difficulty:"PGY1", question:"Which third-generation cephalosporins are at risk for inducing AmpC resistance in organisms like Enterobacter cloacae?", answer:"Ceftriaxone, cefotaxime, and ceftazidime", references:"IDSA 2024 Guidance on AMR Gram-Negative Infections" },
  { category:"Novel Beta-Lactam/BLI Combinations", difficulty:"PGY1", question:"Name three newer β-lactam/β-lactamase inhibitor combinations that have activity against ESBL-producing Enterobacterales.", answer:"Ceftazidime-avibactam, meropenem-vaborbactam, and imipenem-cilastatin-relebactam", references:"IDSA 2023 Guidance on AMR Gram-Negative Infections" },
  { category:"Urinary Tract Infections", difficulty:"PGY1", question:"What are the preferred treatment options for uncomplicated cystitis caused by AmpC-producing Enterobacterales?", answer:"Nitrofurantoin or trimethoprim-sulfamethoxazole (TMP-SMX)", references:"IDSA 2023/2024 Guidance on AMR Gram-Negative Infections" },
  { category:"Epidemiology", difficulty:"PGY1", question:"What is the approximate prevalence of ESBL-producing Enterobacterales in the United States?", answer:"11-13%", references:"Macesic et al., Lancet 2025" },
  { category:"Clinical Vignette", difficulty:"PGY1", question:"A patient with Enterobacter cloacae bacteremia is started on ceftriaxone based on initial susceptibility. Three days later, repeat cultures show resistance to ceftriaxone. What resistance mechanism is most likely responsible?", answer:"Inducible AmpC β-lactamase expression", references:"IDSA 2023/2024 Guidance on AMR Gram-Negative Infections" },
  { category:"Pharmacology/PK-PD", difficulty:"PGY1", question:"Why is ceftolozane-tazobactam potentially more effective than piperacillin-tazobactam against ESBL-producing Enterobacterales?", answer:"Ceftolozane has greater intrinsic stability to ESBL hydrolysis (e.g., CTX-M-15), is less reliant on tazobactam inhibition, AND the 2:1 ratio provides higher tazobactam concentrations compared to piperacillin-tazobactam's 8:1 ratio.", references:"IDSA 2024 Guidance on AMR Gram-Negative Infections" },
  { category:"Guideline Recommendations", difficulty:"PGY1", question:"According to IDSA guidance, what is the preferred antibiotic class for ESBL-producing Enterobacterales bloodstream infections?", answer:"Carbapenems (meropenem, imipenem-cilastatin, or ertapenem*)", references:"IDSA 2023 Guidance on AMR Gram-Negative Infections" },
  { category:"Microbiology Interpretation", difficulty:"PGY1", question:"An E. coli isolate from a bloodstream infection is reported as resistant to ceftriaxone but susceptible to cefoxitin and piperacillin-tazobactam. Is this more likely an ESBL or AmpC producer?", answer:"ESBL producer", references:"Macesic et al., Lancet 2025" },
  { category:"Antimicrobial Stewardship", difficulty:"PGY1", question:"True or False: Newer agents like ceftazidime-avibactam should be used as first-line therapy for all ESBL-producing Enterobacterales infections to preserve carbapenems.", answer:"False", references:"IDSA 2023 Guidance on AMR Gram-Negative Infections" },
  { category:"Ertapenem Limitations", difficulty:"PGY1", question:"Why is ertapenem NOT recommended for critically ill patients or those with hypoalbuminemia when treating ESBL-producing Enterobacterales infections?", answer:"Ertapenem is highly protein-bound (~95%). In hypoalbuminemia, the free fraction increases, leading to increased clearance and a significantly decreased serum half-life.", references:"IDSA 2024 Guidance on AMR Gram-Negative Infections" },
  { category:"MIC Interpretation", difficulty:"PGY1", question:"A patient has Enterobacter cloacae bacteremia with a cefepime MIC of 4 μg/mL (susceptible dose-dependent). Should you be concerned about using cefepime for definitive therapy?", answer:"Yes - higher cefepime MICs (≥4 μg/mL) in AmpC-producing organisms may indicate ESBL co-production, which is associated with cefepime treatment failure.", references:"IDSA 2023 Guidance on AMR Gram-Negative Infections" },
  { category:"Clinical Vignette", difficulty:"PGY1", question:"A 65-year-old woman with pyelonephritis due to ESBL-producing E. coli is improving on meropenem. She is afebrile, hemodynamically stable, and tolerating oral intake. The organism is susceptible to ciprofloxacin. What is an appropriate next step?", answer:"Transition to oral ciprofloxacin for step-down therapy", references:"IDSA 2023/2024 Guidance on AMR Gram-Negative Infections" },
  { category:"Resistance Mechanisms", difficulty:"PGY1", question:"What is the most common ESBL enzyme family found in E. coli and Klebsiella pneumoniae worldwide?", answer:"CTX-M enzymes (particularly CTX-M-15)", references:"Macesic et al., Lancet 2025" },
  { category:"Drug Spectrum", difficulty:"PGY1", question:"True or False: Cephalosporins with activity against ESBL-producing organisms (e.g., cefepime) also have reliable activity against AmpC-producing organisms.", answer:"True (with caveats) - Cefepime is generally effective against AmpC producers but caution is needed when MIC ≥4 μg/mL due to possible ESBL co-production.", references:"IDSA 2023 Guidance on AMR Gram-Negative Infections" },
  { category:"Antimicrobial Stewardship", difficulty:"PGY1", question:"A patient with Klebsiella pneumoniae bacteremia is started empirically on meropenem. Susceptibilities return showing the organism is ESBL-producing but susceptible to piperacillin-tazobactam (MIC 8 μg/mL). Should you de-escalate to piperacillin-tazobactam?", answer:"No - continue meropenem", references:"IDSA 2023 Guidance on AMR Gram-Negative Infections" },
  { category:"Pharmacology", difficulty:"PGY1", question:"Which carbapenem has the NARROWEST spectrum of activity and is therefore preferred when treating ESBL-producing E. coli or Klebsiella infections in non-critically ill patients?", answer:"Ertapenem", references:"IDSA 2023 Guidance on AMR Gram-Negative Infections" },
  { category:"Microbiology Interpretation", difficulty:"PGY1", question:"An E. coli isolate shows resistance to ceftriaxone, ceftazidime, and cefotaxime, but is susceptible to cefepime and meropenem. What resistance mechanism is most likely present?", answer:"ESBL production", references:"IDSA 2023 Guidance on AMR Gram-Negative Infections" },
  { category:"Novel Beta-Lactam/BLI Combinations", difficulty:"PGY1", question:"Which newer β-lactamase inhibitor is paired with ceftazidime and has activity against both ESBL-producing and carbapenem-resistant Enterobacterales?", answer:"Avibactam (ceftazidime-avibactam)", references:"IDSA 2023 Guidance on AMR Gram-Negative Infections" },
  { category:"Clinical Vignette", difficulty:"PGY1", question:"A 45-year-old man with uncomplicated cystitis due to Enterobacter cloacae (AmpC-producer) presents to urgent care. The organism is susceptible to nitrofurantoin, TMP-SMX, and ciprofloxacin. Which agent would you recommend for outpatient oral therapy?", answer:"Nitrofurantoin or TMP-SMX (ciprofloxacin is also acceptable)", references:"IDSA 2023 Guidance on AMR Gram-Negative Infections" }
];

// Game state
// -----------------------------
let playerTurn = 1;
let score1 = 0;
let score2 = 0;
let filteredQuestions = [...questions];
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
canvas.width = 400;
canvas.height = 400;
let spinning = false;

// -----------------------------
// Draw the wheel
// -----------------------------
function drawWheel() {
  const slices = filteredQuestions.length;
  const sliceAngle = 2 * Math.PI / slices;
  ctx.clearRect(0, 0, 400, 400);

  for (let i = 0; i < slices; i++) {
    ctx.beginPath();
    ctx.moveTo(200, 200);
    ctx.arc(200, 200, 200, i * sliceAngle, (i + 1) * sliceAngle);
    ctx.fillStyle = i % 2 === 0 ? "#1a73e8" : "#66a3ff";
    ctx.fill();
    ctx.stroke();
    ctx.save();
    ctx.translate(200, 200);
    ctx.rotate((i + 0.5) * sliceAngle);
    ctx.textAlign = "right";
    ctx.fillStyle = "white";
    ctx.font = "bold 14px Arial";
    ctx.fillText(filteredQuestions[i].category, 190, 0);
    ctx.restore();
  }
}
drawWheel();

// -----------------------------
// Spin the wheel
// -----------------------------
function spinWheel() {
  if (spinning || filteredQuestions.length === 0) return;
  spinning = true;
  const spins = Math.floor(Math.random() * 3) + 3;
  const extra = Math.random() * 360;
  const angleDeg = spins * 360 + extra;
  canvas.style.transition = "transform 5s cubic-bezier(0.33,1,0.68,1)";
  canvas.style.transform = `rotate(${angleDeg}deg)`;
  setTimeout(() => { displayQuestion(angleDeg); spinning = false; }, 5000);
}

// -----------------------------
// Display selected question
// -----------------------------
function displayQuestion(angleDeg) {
  const slices = filteredQuestions.length;
  const sliceDeg = 360 / slices;
  const index = slices - Math.floor(((angleDeg % 360) / sliceDeg)) - 1;
  const q = filteredQuestions[index];
  const container = document.getElementById("question-container");
  container.innerHTML = `
    <div class="question-card">
      <strong>Category:</strong> ${q.category}<br>
      <strong>Difficulty:</strong> ${q.difficulty}<br>
      <strong>Question:</strong> ${q.question}<br>
      <button onclick="revealAnswer(this)">Reveal Answer</button>
      <div class="answer">${q.answer}</div>
    </div>
  `;
}

// -----------------------------
// Reveal answer and update score
// -----------------------------
function revealAnswer(button) {
  const answerDiv = button.nextElementSibling;
  answerDiv.style.display = "block";
  button.disabled = true;

  // Add points to current player
  if (playerTurn === 1) { score1 += 1; document.getElementById("score1").textContent = score1; }
  else { score2 += 1; document.getElementById("score2").textContent = score2; }

  // Switch turn
  playerTurn = playerTurn === 1 ? 2 : 1;
  document.getElementById("turnIndicator").textContent = `Player ${playerTurn}'s Turn`;
}
</script>
</body>
</html>
