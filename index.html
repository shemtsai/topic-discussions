<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ID Pharmacy Game</title>

<style>
body{
font-family: Arial;
background:#0f2a44;
color:white;
text-align:center;
}

h1{
margin-top:10px;
}

.board{
display:grid;
grid-template-columns: repeat(5, 1fr);
gap:10px;
max-width:1000px;
margin:auto;
margin-top:20px;
}

.tile{
background:#1e5fa8;
padding:25px;
font-size:20px;
cursor:pointer;
border-radius:6px;
}

.tile:hover{
background:#2c7be5;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
}

.modal-content{
background:white;
color:black;
padding:30px;
max-width:800px;
margin:100px auto;
border-radius:8px;
}

button{
margin:10px;
padding:10px 18px;
font-size:16px;
}

.scoreboard{
margin-top:20px;
}

</style>
</head>

<body>

<h1>Antimicrobial Resistance Challenge</h1>

<div class="scoreboard">
Team Score: <span id="score">0</span>
<br>
<button onclick="addScore(100)">+100</button>
<button onclick="addScore(-100)">-100</button>
<button onclick="resetScore()">Reset Score</button>
</div>

<div class="board" id="board"></div>

<div class="modal" id="modal">
<div class="modal-content">

<h2 id="category"></h2>

<p id="question"></p>

<div id="answerBlock" style="display:none">

<h3>Answer</h3>
<p id="answer"></p>

<h4>Explanation</h4>
<p id="explanation"></p>

</div>

<button onclick="showAnswer()">Reveal Answer</button>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

let score=0

function addScore(val){
score+=val
document.getElementById("score").innerText=score
}

function resetScore(){
score=0
document.getElementById("score").innerText=score
}

const questions=[

{
category:"Resistance Mechanisms",
value:100,
question:"What phenotypic feature distinguishes AmpC β-lactamases from ESBLs regarding β-lactamase inhibitors?",
answer:"AmpC enzymes are NOT inhibited by clavulanic acid or tazobactam, while ESBLs ARE inhibited.",
explanation:"AmpC enzymes also resist cephamycins such as cefoxitin, unlike ESBLs."
},

{
category:"Clinical Trials",
value:100,
question:"In the MERINO trial for ESBL bacteremia, which drug had lower mortality?",
answer:"Meropenem",
explanation:"Mortality was 4% with meropenem vs 12% with piperacillin-tazobactam."
},

{
category:"Organism Identification",
value:100,
question:"Name three Enterobacterales species at high risk for AmpC production.",
answer:"Enterobacter cloacae complex, Klebsiella aerogenes, Citrobacter freundii",
explanation:"These organisms may develop resistance to third-generation cephalosporins during therapy."
},

{
category:"Pharmacology",
value:100,
question:"Why is cefepime generally effective against AmpC-producing Enterobacterales?",
answer:"It is a weak AmpC inducer and forms stable acyl enzyme complexes resistant to hydrolysis.",
explanation:"This dual property helps preserve activity against AmpC enzymes."
},

{
category:"Stewardship",
value:100,
question:"Name three preferred oral step-down options for ESBL E. coli UTIs after improvement.",
answer:"TMP-SMX, ciprofloxacin, or levofloxacin",
explanation:"These achieve good urinary concentrations and allow carbapenem sparing."
},

{
category:"Resistance Mechanisms",
value:200,
question:"What are three mechanisms of increased AmpC production?",
answer:"Inducible expression, stable derepression, or plasmid-mediated ampC genes.",
explanation:"These mechanisms predict risk of resistance during therapy."
},

{
category:"Drug Spectrum",
value:200,
question:"Which third-generation cephalosporins can induce AmpC resistance?",
answer:"Ceftriaxone, cefotaxime, ceftazidime",
explanation:"These are susceptible to hydrolysis and should be avoided in high-risk organisms."
},

{
category:"UTI Therapy",
value:200,
question:"Preferred treatments for uncomplicated cystitis due to AmpC producers?",
answer:"Nitrofurantoin or TMP-SMX",
explanation:"Fluoroquinolones and aminoglycosides are alternatives."
},

{
category:"Epidemiology",
value:200,
question:"Approximate prevalence of ESBL Enterobacterales in the United States?",
answer:"About 11-13%",
explanation:"Rates vary widely worldwide."
},

{
category:"Guidelines",
value:200,
question:"Preferred therapy for ESBL bloodstream infections per IDSA guidance?",
answer:"Carbapenems",
explanation:"MERINO demonstrated lower mortality compared with piperacillin-tazobactam."
}

]

function buildBoard(){

const board=document.getElementById("board")

questions.forEach((q,i)=>{

let tile=document.createElement("div")

tile.className="tile"

tile.innerText=q.category+"\n"+q.value

tile.onclick=()=>openQuestion(i)

board.appendChild(tile)

})

}

function openQuestion(i){

let q=questions[i]

document.getElementById("modal").style.display="block"

document.getElementById("category").innerText=q.category

document.getElementById("question").innerText=q.question

document.getElementById("answer").innerText=q.answer

document.getElementById("explanation").innerText=q.explanation

document.getElementById("answerBlock").style.display="none"

}

function showAnswer(){

document.getElementById("answerBlock").style.display="block"

}

function closeModal(){

document.getElementById("modal").style.display="none"

}

buildBoard()

</script>

</body>
</html><!DOCTYPE html>
