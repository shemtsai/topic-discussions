<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMR Blitz — Team Buzzer Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #080a0f;
  --dark: #0d1117;
  --panel: #12181f;
  --cyan: #00f5d4;
  --pink: #ff2d78;
  --yellow: #ffe600;
  --white: #f0f4f8;
  --dim: #4a5568;
  --cyan-glow: 0 0 20px rgba(0,245,212,0.4), 0 0 60px rgba(0,245,212,0.15);
  --pink-glow: 0 0 20px rgba(255,45,120,0.4), 0 0 60px rgba(255,45,120,0.15);
  --yellow-glow: 0 0 20px rgba(255,230,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(0,245,212,0.03) 59px, rgba(0,245,212,0.03) 60px),
    repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(0,245,212,0.03) 59px, rgba(0,245,212,0.03) 60px);
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ── SETUP SCREEN ── */
#setupScreen {
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 2rem;
}
.logo {
  text-align: center;
}
.logo-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 8vw, 6rem);
  letter-spacing: 0.06em;
  line-height: 0.9;
  color: var(--cyan);
  text-shadow: var(--cyan-glow);
}
.logo-sub {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--dim);
  margin-top: 0.5rem;
}
.setup-card {
  background: var(--panel);
  border: 1px solid rgba(0,245,212,0.15);
  border-radius: 12px;
  padding: 2rem;
  width: 100%;
  max-width: 560px;
}
.setup-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 1.5rem;
}
.team-inputs { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
.team-row { display: flex; align-items: center; gap: 0.75rem; }
.team-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.team-dot.c { background: var(--cyan); box-shadow: var(--cyan-glow); }
.team-dot.p { background: var(--pink); box-shadow: var(--pink-glow); }
.team-dot.y { background: var(--yellow); box-shadow: var(--yellow-glow); }
.team-dot.w { background: #a78bfa; box-shadow: 0 0 20px rgba(167,139,250,0.4); }

.team-input {
  flex: 1;
  background: var(--dark);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 0.6rem 1rem;
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  outline: none;
  transition: border-color 0.2s;
}
.team-input:focus { border-color: rgba(0,245,212,0.4); }
.team-key {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--dim);
  min-width: 60px;
  text-align: right;
}

.settings-row {
  display: flex;
  gap: 1rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.setting-group { flex: 1; min-width: 140px; }
.setting-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 0.4rem;
}
.setting-select {
  width: 100%;
  background: var(--dark);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 0.55rem 0.8rem;
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
  outline: none;
  cursor: pointer;
}

.start-btn {
  width: 100%;
  background: var(--cyan);
  color: var(--black);
  border: none;
  padding: 1rem;
  border-radius: 8px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--cyan-glow);
}
.start-btn:hover {
  background: var(--white);
  box-shadow: 0 0 30px rgba(255,255,255,0.3);
  transform: translateY(-2px);
}

/* ── GAME SCREEN ── */
#gameScreen { flex-direction: column; }

/* SCOREBAR */
.scorebar {
  display: flex;
  align-items: stretch;
  gap: 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
  height: 80px;
}
.team-score-panel {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  padding: 0 1.5rem;
  position: relative;
  transition: all 0.3s;
}
.team-score-panel.buzzed {
  animation: buzzFlash 0.5s ease;
}
@keyframes buzzFlash {
  0%,100% { background: transparent; }
  50% { background: rgba(0,245,212,0.15); }
}
.team-score-panel.buzzed-pink {
  animation: buzzFlashPink 0.5s ease;
}
@keyframes buzzFlashPink {
  0%,100% { background: transparent; }
  50% { background: rgba(255,45,120,0.15); }
}
.team-name-display {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--dim);
}
.team-pts {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  letter-spacing: 0.04em;
  line-height: 1;
}
.buzz-indicator {
  width: 8px; height: 8px;
  border-radius: 50%;
  opacity: 0.2;
  transition: all 0.2s;
  flex-shrink: 0;
}
.buzz-indicator.active {
  opacity: 1;
  animation: pulse 0.6s infinite alternate;
}
@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.5); }
}

.scorebar-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 1.5rem;
  min-width: 160px;
  border-left: 1px solid rgba(255,255,255,0.06);
  border-right: 1px solid rgba(255,255,255,0.06);
}
.q-counter {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--dim);
}
.q-counter span { color: var(--white); }

/* TIMER RING */
.timer-wrap {
  position: relative;
  width: 48px; height: 48px;
}
.timer-svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
.timer-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 3; }
.timer-fill {
  fill: none;
  stroke: var(--cyan);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 126;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear, stroke 0.5s;
}
.timer-num {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0;
  color: var(--cyan);
  transition: color 0.3s;
}

/* GAME AREA */
.game-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 1.5rem;
  position: relative;
}

.category-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 0.3rem 1rem;
  border-radius: 100px;
  border: 1px solid rgba(0,245,212,0.3);
  color: var(--cyan);
  background: rgba(0,245,212,0.06);
}
.points-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.05em;
  color: var(--yellow);
  text-shadow: var(--yellow-glow);
}

.question-card {
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 2.5rem;
  max-width: 780px;
  width: 100%;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.question-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: 0.5;
}
.question-text {
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  font-weight: 400;
  line-height: 1.65;
  color: var(--white);
}

.answer-reveal {
  display: none;
  background: rgba(0,245,212,0.05);
  border: 1px solid rgba(0,245,212,0.2);
  border-radius: 10px;
  padding: 1.2rem 1.5rem;
  max-width: 780px;
  width: 100%;
  animation: revealIn 0.3s ease;
}
.answer-reveal.visible { display: block; }
@keyframes revealIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.answer-reveal-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 0.4rem;
}
.answer-reveal-text {
  font-size: 1rem;
  font-weight: 500;
  line-height: 1.5;
  color: var(--white);
  margin-bottom: 0.6rem;
}
.explanation-reveal {
  font-size: 0.82rem;
  color: rgba(240,244,248,0.55);
  line-height: 1.55;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 0.6rem;
  margin-top: 0.4rem;
}

/* BUZZ STATUS BAR */
.buzz-status {
  text-align: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--dim);
  min-height: 1.2em;
}
.buzz-status.active { color: var(--yellow); }

/* CONTROL ROW */
.control-row {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 780px;
  width: 100%;
}
.ctrl-btn {
  flex: 1;
  min-width: 120px;
  padding: 0.7rem 1rem;
  border-radius: 8px;
  border: 1px solid;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: all 0.15s;
}
.ctrl-btn.reveal-q {
  background: transparent;
  border-color: rgba(255,255,255,0.2);
  color: var(--white);
}
.ctrl-btn.reveal-q:hover { background: rgba(255,255,255,0.06); }
.ctrl-btn.correct {
  background: rgba(0,245,212,0.08);
  border-color: rgba(0,245,212,0.35);
  color: var(--cyan);
}
.ctrl-btn.correct:hover { background: rgba(0,245,212,0.18); box-shadow: var(--cyan-glow); }
.ctrl-btn.incorrect {
  background: rgba(255,45,120,0.08);
  border-color: rgba(255,45,120,0.35);
  color: var(--pink);
}
.ctrl-btn.incorrect:hover { background: rgba(255,45,120,0.18); box-shadow: var(--pink-glow); }
.ctrl-btn.next-q {
  background: var(--yellow);
  border-color: var(--yellow);
  color: var(--black);
  box-shadow: var(--yellow-glow);
}
.ctrl-btn.next-q:hover { background: var(--white); border-color: var(--white); }
.ctrl-btn.skip-q {
  background: transparent;
  border-color: rgba(255,255,255,0.1);
  color: var(--dim);
}
.ctrl-btn.skip-q:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }
.ctrl-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

/* BUZZ BUTTONS (bottom) */
.buzz-zone {
  display: flex;
  gap: 0;
  border-top: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.buzz-btn {
  flex: 1;
  padding: 1.1rem;
  border: none;
  cursor: pointer;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.1em;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.buzz-btn::after {
  content: attr(data-key);
  position: absolute;
  top: 6px; right: 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  opacity: 0.4;
}
.buzz-btn:disabled { opacity: 0.3; cursor: default; }
.buzz-btn:not(:disabled):active { transform: scale(0.97); }

/* LEADERBOARD / END SCREEN */
#endScreen {
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 2rem;
}
.end-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  letter-spacing: 0.08em;
  color: var(--yellow);
  text-shadow: var(--yellow-glow);
  text-align: center;
}
.podium {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 0.5rem;
  width: 100%;
  max-width: 500px;
}
.podium-place {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
}
.podium-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: center;
}
.podium-pts {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.04em;
}
.podium-block {
  width: 100%;
  border-radius: 6px 6px 0 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
}
.play-again-btn {
  background: transparent;
  border: 2px solid var(--cyan);
  color: var(--cyan);
  padding: 0.9rem 3rem;
  border-radius: 8px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--cyan-glow);
}
.play-again-btn:hover { background: var(--cyan); color: var(--black); }

/* TOAST */
.toast {
  position: fixed;
  top: 90px; left: 50%;
  transform: translateX(-50%) scale(0.9);
  padding: 0.8rem 2rem;
  border-radius: 8px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 0.1em;
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s;
  z-index: 200;
  border: 1px solid;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}
.toast.cyan { background: rgba(0,245,212,0.12); border-color: var(--cyan); color: var(--cyan); box-shadow: var(--cyan-glow); }
.toast.pink { background: rgba(255,45,120,0.12); border-color: var(--pink); color: var(--pink); box-shadow: var(--pink-glow); }
.toast.yellow { background: rgba(255,230,0,0.12); border-color: var(--yellow); color: var(--yellow); }

em { font-style: italic; color: rgba(0,245,212,0.8); }

@media (max-width: 500px) {
  .question-card { padding: 1.5rem; }
  .scorebar-center { display: none; }
}
</style>
</head>
<body>

<!-- ══════════ SETUP ══════════ -->
<div class="screen active" id="setupScreen">
  <div class="logo">
    <div class="logo-main">AMR BLITZ</div>
    <div class="logo-sub">Rapid-Fire Team Quiz · AMR Gram-Negative Infections</div>
  </div>
  <div class="setup-card">
    <div class="setup-title">⚡ Team Configuration</div>
    <div class="team-inputs" id="teamInputs">
      <div class="team-row">
        <div class="team-dot c"></div>
        <input class="team-input" value="Team Alpha" placeholder="Team 1 Name" />
        <span class="team-key">Press Q</span>
      </div>
      <div class="team-row">
        <div class="team-dot p"></div>
        <input class="team-input" value="Team Beta" placeholder="Team 2 Name" />
        <span class="team-key">Press P</span>
      </div>
    </div>
    <div class="settings-row">
      <div class="setting-group">
        <div class="setting-label">Timer (seconds)</div>
        <select class="setting-select" id="timerSetting">
          <option value="10">10s — Lightning</option>
          <option value="15" selected>15s — Standard</option>
          <option value="20">20s — Relaxed</option>
          <option value="30">30s — Teaching</option>
          <option value="0">No timer</option>
        </select>
      </div>
      <div class="setting-group">
        <div class="setting-label">Question Order</div>
        <select class="setting-select" id="orderSetting">
          <option value="random">Shuffle</option>
          <option value="original">Original Order</option>
          <option value="points-asc">Easy → Hard</option>
          <option value="points-desc">Hard → Easy</option>
        </select>
      </div>
    </div>
    <button class="start-btn" onclick="startGame()">START THE BLITZ</button>
  </div>
</div>

<!-- ══════════ GAME ══════════ -->
<div class="screen" id="gameScreen">
  <!-- Scorebar -->
  <div class="scorebar" id="scorebar"></div>

  <!-- Main area -->
  <div class="game-area">
    <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;justify-content:center">
      <div class="category-badge" id="catBadge">Category</div>
      <div class="points-badge" id="ptsBadge">+200 pts</div>
    </div>

    <div class="question-card">
      <div class="question-text" id="qText">Question loads here...</div>
    </div>

    <div class="answer-reveal" id="answerReveal">
      <div class="answer-reveal-label">Answer</div>
      <div class="answer-reveal-text" id="answerText"></div>
      <div class="explanation-reveal" id="explanText"></div>
    </div>

    <div class="buzz-status" id="buzzStatus">— Press buzz button or keyboard to buzz in —</div>

    <div class="control-row" id="controlRow">
      <button class="ctrl-btn reveal-q" onclick="revealAnswer()">👁 Reveal Answer</button>
      <button class="ctrl-btn skip-q" onclick="skipQuestion()">Skip →</button>
    </div>
  </div>

  <!-- Buzz zone -->
  <div class="buzz-zone" id="buzzZone"></div>
</div>

<!-- ══════════ END ══════════ -->
<div class="screen" id="endScreen">
  <div class="end-title">FINAL SCORES</div>
  <div class="podium" id="podium"></div>
  <button class="play-again-btn" onclick="goSetup()">↺ Play Again</button>
</div>

<div class="toast" id="toast"></div>

<script>
const ALL_QUESTIONS = [
  { id:1,  cat:"Resistance Mechanisms",      pts:200,  q:"What is the key phenotypic difference that distinguishes AmpC β-lactamases from ESBLs in terms of susceptibility to β-lactamase inhibitors?", a:"AmpC β-lactamases are NOT inhibited by clavulanic acid or tazobactam, whereas ESBLs ARE inhibited by these β-lactamase inhibitors.", exp:"AmpC enzymes also resist cephamycins (e.g., cefoxitin), unlike ESBLs. This phenotypic distinction is clinically important for laboratory differentiation." },
  { id:2,  cat:"Clinical Trials",            pts:200,  q:"In the MERINO trial comparing piperacillin-tazobactam to meropenem for ESBL-producing Enterobacterales bloodstream infections, which agent had lower 30-day mortality?", a:"Meropenem — 4% mortality vs 12% with piperacillin-tazobactam.", exp:"This landmark trial established carbapenems as preferred therapy for ESBL-E bloodstream infections, even after reanalysis using revised MIC criteria." },
  { id:3,  cat:"Organism Identification",    pts:200,  q:"Name three Enterobacterales species at MODERATE to HIGH risk for clinically significant AmpC production due to inducible ampC gene expression.", a:"<em>Enterobacter cloacae</em> complex, <em>Klebsiella aerogenes</em>, and <em>Citrobacter freundii</em>", exp:"These organisms can develop resistance to third-generation cephalosporins during therapy through ampC induction, even if initially susceptible." },
  { id:4,  cat:"Pharmacology",               pts:200,  q:"Why is cefepime generally effective against AmpC-producing Enterobacterales despite resistance to third-generation cephalosporins?", a:"Cefepime is a weak inducer of ampC AND forms stable acyl enzyme complexes that resist hydrolysis by AmpC β-lactamases.", exp:"This dual property makes cefepime a preferred agent for AmpC-producing organisms." },
  { id:5,  cat:"Antimicrobial Stewardship",  pts:200,  q:"For ESBL-producing <em>E. coli</em> UTIs, name three preferred oral step-down options after clinical improvement (assuming susceptibility).", a:"Trimethoprim-sulfamethoxazole (TMP-SMX), ciprofloxacin, or levofloxacin", exp:"These agents achieve adequate urinary concentrations and allow carbapenem-sparing after hemodynamic stability." },
  { id:6,  cat:"Resistance Mechanisms",      pts:400,  q:"What are the three mechanisms by which Enterobacterales can exhibit increased AmpC β-lactamase production?", a:"(1) Inducible chromosomal expression, (2) Stable chromosomal derepression, (3) Constitutively expressed ampC genes (plasmid-mediated or chromosomally integrated)", exp:"Understanding these mechanisms helps predict resistance development risk during therapy and guides antibiotic selection." },
  { id:7,  cat:"Drug Spectrum",              pts:400,  q:"Which third-generation cephalosporins are at risk for inducing AmpC resistance in organisms like <em>Enterobacter cloacae</em>?", a:"Ceftriaxone, cefotaxime, and ceftazidime", exp:"These agents are relatively weak ampC inducers but susceptible to hydrolysis, making them less effective for moderate-risk AmpC organisms." },
  { id:8,  cat:"Novel BL/BLI Combinations",  pts:400,  q:"Name three newer β-lactam/β-lactamase inhibitor combinations with activity against ESBL-producing Enterobacterales.", a:"Ceftazidime-avibactam, meropenem-vaborbactam, and imipenem-cilastatin-relebactam", exp:"These agents should be reserved for carbapenem-resistant organisms where greater need exists." },
  { id:9,  cat:"Urinary Tract Infections",   pts:400,  q:"What are the preferred treatment options for uncomplicated cystitis caused by AmpC-producing Enterobacterales?", a:"Nitrofurantoin or TMP-SMX (ciprofloxacin or levofloxacin are alternatives)", exp:"These first-line agents achieve adequate urinary concentrations for uncomplicated cystitis." },
  { id:10, cat:"Epidemiology",               pts:400,  q:"What is the approximate prevalence of ESBL-producing Enterobacterales in the United States?", a:"11–13%", exp:"ESBL rates vary globally: 5–25% western Europe, >50% southern/eastern Europe, 30–80% Asia, 10–15% Australia/NZ." },
  { id:11, cat:"Clinical Vignette",          pts:600,  q:"A patient with <em>Enterobacter cloacae</em> bacteremia is started on ceftriaxone based on initial susceptibility. Three days later, repeat cultures show resistance to ceftriaxone. What resistance mechanism is most likely responsible?", a:"Inducible AmpC β-lactamase expression", exp:"<em>E. cloacae</em> can develop resistance to 3rd-gen cephalosporins through ampC induction even after initial susceptibility — sometimes within just a few doses." },
  { id:12, cat:"Pharmacology/PK-PD",         pts:600,  q:"Why is ceftolozane-tazobactam potentially more effective than piperacillin-tazobactam against ESBL-producing Enterobacterales?", a:"Greater intrinsic stability to ESBL hydrolysis (CTX-M-15), less reliance on tazobactam inhibition, AND a 2:1 ratio providing higher tazobactam concentrations vs pip-tazo's 8:1 ratio.", exp:"These pharmacologic advantages yield MICs several dilutions lower than piperacillin-tazobactam." },
  { id:13, cat:"Guideline Recommendations",  pts:600,  q:"According to IDSA guidance, what is the preferred antibiotic class for ESBL-producing Enterobacterales bloodstream infections?", a:"Carbapenems (meropenem, imipenem-cilastatin, or ertapenem*). *Ertapenem limited to non-critically ill patients with normal albumin.", exp:"Based on MERINO trial evidence, carbapenems are the gold standard for ESBL-E BSI." },
  { id:14, cat:"Microbiology Interpretation",pts:600,  q:"An <em>E. coli</em> BSI isolate is resistant to ceftriaxone but susceptible to cefoxitin and piperacillin-tazobactam. ESBL or AmpC producer?", a:"ESBL producer", exp:"ESBLs remain susceptible to cephamycins (cefoxitin) and β-lactamase inhibitors. AmpC producers are resistant to both." },
  { id:15, cat:"Antimicrobial Stewardship",  pts:600,  q:"True or False: Newer agents like ceftazidime-avibactam should be used as first-line therapy for ALL ESBL-producing Enterobacterales to preserve carbapenems.", a:"FALSE — these agents should be reserved for carbapenem-resistant organisms.", exp:"IDSA guidance specifies reserving novel BL/BLI combinations for CRE, where the clinical need is greater. Carbapenems remain preferred for ESBL-E." },
  { id:16, cat:"Ertapenem Limitations",      pts:800,  q:"Why is ertapenem NOT recommended for critically ill patients or those with hypoalbuminemia when treating ESBL-E?", a:"Ertapenem is ~95% protein-bound. Hypoalbuminemia increases free fraction → increased clearance → decreased half-life, suboptimal with once-daily dosing.", exp:"Hypoalbuminemia (albumin <2.5 g/dL) associated with ~5× higher odds of 30-day mortality with ertapenem vs meropenem." },
  { id:17, cat:"MIC Interpretation",         pts:800,  q:"A patient has <em>Enterobacter cloacae</em> bacteremia with a cefepime MIC of 4 μg/mL (susceptible dose-dependent). Should you be concerned?", a:"Yes — cefepime MIC ≥4 μg/mL in AmpC producers may indicate ESBL co-production, associated with treatment failure.", exp:"89% of <em>E. cloacae</em> isolates with cefepime MICs 4–8 μg/mL were ESBL-producing in one study; all 10 patients on cefepime died within 30 days." },
  { id:18, cat:"Clinical Vignette",          pts:800,  q:"A 65-year-old woman with ESBL-E. coli pyelonephritis is improving on meropenem, now afebrile, hemodynamically stable, tolerating PO. Organism susceptible to ciprofloxacin. What's next?", a:"Transition to oral ciprofloxacin for step-down therapy.", exp:"Oral fluoroquinolones achieve adequate urinary concentrations and allow carbapenem-sparing after clinical improvement." },
  { id:19, cat:"Resistance Mechanisms",      pts:800,  q:"What is the most common ESBL enzyme family found in <em>E. coli</em> and <em>Klebsiella pneumoniae</em> worldwide?", a:"CTX-M enzymes (particularly CTX-M-15)", exp:"CTX-M-type ESBLs have largely replaced TEM and SHV variants globally, with CTX-M-15 being the most widespread." },
  { id:20, cat:"Drug Spectrum",              pts:800,  q:"True or False: Cephalosporins with activity against ESBL-producing organisms (e.g., cefepime) also have reliable activity against AmpC-producing organisms.", a:"True (with caveats) — cefepime effective against AmpC producers due to weak induction + stability.", exp:"Caution when cefepime MIC ≥4 μg/mL due to possible ESBL co-production." },
  { id:21, cat:"Antimicrobial Stewardship",  pts:1000, q:"A patient with <em>Klebsiella pneumoniae</em> ESBL-E bacteremia on empiric meropenem: susceptibilities show susceptibility to pip-tazo (MIC 8). De-escalate?", a:"No — continue meropenem. MERINO trial showed higher mortality with pip-tazo even at susceptible MICs.", exp:"Carbapenems remain preferred for definitive therapy of ESBL-E bloodstream infections regardless of pip-tazo susceptibility." },
  { id:22, cat:"Pharmacology",               pts:1000, q:"Which carbapenem has the narrowest spectrum and is preferred for ESBL-producing <em>E. coli</em>/<em>Klebsiella</em> in non-critically ill patients?", a:"Ertapenem — lacks activity against <em>Pseudomonas aeruginosa</em> and <em>Acinetobacter</em> species.", exp:"More targeted option with potentially less collateral microbiome damage, limited to non-critically ill patients with normal albumin." },
  { id:23, cat:"Microbiology Interpretation",pts:1000, q:"An <em>E. coli</em> isolate is resistant to ceftriaxone, ceftazidime, and cefotaxime, but susceptible to cefepime and meropenem. What resistance mechanism is most likely?", a:"ESBL production", exp:"ESBLs confer resistance to 3rd-gen cephalosporins but typically remain susceptible to cefepime (4th-gen) and carbapenems." },
  { id:24, cat:"Novel BL/BLI Combinations",  pts:1000, q:"Which newer β-lactamase inhibitor is paired with ceftazidime and has activity against both ESBL-E and carbapenem-resistant Enterobacterales?", a:"Avibactam (ceftazidime-avibactam) — inhibits class A (ESBL, KPC), class C (AmpC), and some class D; does NOT inhibit metallo-β-lactamases.", exp:"Non-β-lactam BLI with broad inhibitory spectrum except for MBLs." },
  { id:25, cat:"Clinical Vignette",          pts:1000, q:"A 45-year-old man with uncomplicated <em>Enterobacter cloacae</em> cystitis (AmpC producer) — susceptible to nitrofurantoin, TMP-SMX, and ciprofloxacin. Preferred outpatient treatment?", a:"Nitrofurantoin or TMP-SMX (ciprofloxacin acceptable but reserve if alternatives available)", exp:"Nitrofurantoin and TMP-SMX are preferred first-line for uncomplicated cystitis in AmpC producers. Fluoroquinolones are alternatives." }
];

// ── Game state
let teams = [];
let questions = [];
let qIndex = 0;
let timerDuration = 15;
let timerInterval = null;
let timeLeft = 15;
let buzzedTeam = null;
let answerRevealed = false;
let scoringDone = false;
const TEAM_COLORS = ['#00f5d4','#ff2d78','#ffe600','#a78bfa'];
const TEAM_BUZZ_KEYS = ['q','p','z','m'];

function startGame() {
  const inputs = document.querySelectorAll('.team-input');
  teams = Array.from(inputs).map((inp, i) => ({
    name: inp.value.trim() || `Team ${i+1}`,
    score: 0,
    color: TEAM_COLORS[i],
    key: TEAM_BUZZ_KEYS[i]
  }));

  timerDuration = parseInt(document.getElementById('timerSetting').value);
  const order = document.getElementById('orderSetting').value;

  questions = [...ALL_QUESTIONS];
  if (order === 'random') questions.sort(() => Math.random()-0.5);
  else if (order === 'points-asc') questions.sort((a,b) => a.pts - b.pts);
  else if (order === 'points-desc') questions.sort((a,b) => b.pts - a.pts);

  qIndex = 0;
  buildScorebBar();
  buildBuzzZone();
  showScreen('gameScreen');
  loadQuestion();
}

function buildScorebBar() {
  const bar = document.getElementById('scorebar');
  bar.innerHTML = '';
  const half = Math.ceil(teams.length/2);
  teams.forEach((t, i) => {
    if (i === half) {
      const center = document.createElement('div');
      center.className = 'scorebar-center';
      center.innerHTML = `
        <div class="q-counter">Q <span id="qNum">1</span> / ${questions.length}</div>
        <div class="timer-wrap" id="timerWrap">
          <svg class="timer-svg" viewBox="0 0 48 48" width="48" height="48">
            <circle class="timer-track" cx="24" cy="24" r="20"/>
            <circle class="timer-fill" id="timerArc" cx="24" cy="24" r="20"/>
          </svg>
          <div class="timer-num" id="timerNum">—</div>
        </div>`;
      bar.appendChild(center);
    }
    const panel = document.createElement('div');
    panel.className = 'team-score-panel';
    panel.id = `panel-${i}`;
    panel.innerHTML = `
      <div class="buzz-indicator" id="buzz-ind-${i}" style="background:${t.color}"></div>
      <div>
        <div class="team-name-display" style="color:${t.color}">${t.name}</div>
        <div class="team-pts" id="score-${i}" style="color:${t.color}">0</div>
      </div>`;
    bar.appendChild(panel);
  });
  // If even number, add center after last
  if (teams.length <= 2) {
    const center = document.createElement('div');
    center.className = 'scorebar-center';
    center.innerHTML = `
      <div class="q-counter">Q <span id="qNum">1</span> / ${questions.length}</div>
      <div class="timer-wrap">
        <svg class="timer-svg" viewBox="0 0 48 48" width="48" height="48">
          <circle class="timer-track" cx="24" cy="24" r="20"/>
          <circle class="timer-fill" id="timerArc" cx="24" cy="24" r="20"/>
        </svg>
        <div class="timer-num" id="timerNum">—</div>
      </div>`;
    bar.insertBefore(center, bar.children[1]);
  }
}

function buildBuzzZone() {
  const zone = document.getElementById('buzzZone');
  zone.innerHTML = '';
  teams.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'buzz-btn';
    btn.id = `buzz-btn-${i}`;
    btn.dataset.key = t.key.toUpperCase();
    btn.textContent = `⚡ ${t.name}`;
    btn.style.background = hexToRgba(t.color, 0.08);
    btn.style.color = t.color;
    btn.style.borderTop = `3px solid ${t.color}`;
    btn.onclick = () => teamBuzz(i);
    zone.appendChild(btn);
  });
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function loadQuestion() {
  if (qIndex >= questions.length) { endGame(); return; }
  const q = questions[qIndex];
  buzzedTeam = null;
  answerRevealed = false;
  scoringDone = false;

  document.getElementById('catBadge').textContent = q.cat;
  document.getElementById('ptsBadge').textContent = `+${q.pts} pts`;
  document.getElementById('qText').innerHTML = q.q;
  document.getElementById('answerText').innerHTML = q.a;
  document.getElementById('explanText').innerHTML = q.exp;
  document.getElementById('answerReveal').classList.remove('visible');
  document.getElementById('buzzStatus').textContent = '— Press buzz button or keyboard to buzz in —';
  document.getElementById('buzzStatus').classList.remove('active');

  if (document.getElementById('qNum')) document.getElementById('qNum').textContent = qIndex+1;

  setControlRow('waiting');
  enableBuzzButtons(true);
  resetBuzzIndicators();

  if (timerDuration > 0) startTimer();
  else { document.getElementById('timerNum').textContent = '—'; }
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = timerDuration;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      onTimeUp();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('timerNum');
  const arc = document.getElementById('timerArc');
  if (!el || !arc) return;
  el.textContent = timerDuration > 0 ? timeLeft : '—';
  const pct = timerDuration > 0 ? timeLeft / timerDuration : 1;
  const circumference = 126;
  arc.style.strokeDashoffset = circumference * (1 - pct);
  const color = pct > 0.5 ? '#00f5d4' : pct > 0.25 ? '#ffe600' : '#ff2d78';
  arc.style.stroke = color;
  if (el) el.style.color = color;
}

function onTimeUp() {
  if (buzzedTeam !== null) return;
  document.getElementById('buzzStatus').textContent = '⏱ Time\'s up! Reveal answer.';
  enableBuzzButtons(false);
  setControlRow('timeup');
}

function teamBuzz(idx) {
  if (buzzedTeam !== null || scoringDone) return;
  clearInterval(timerInterval);
  buzzedTeam = idx;
  const t = teams[idx];

  document.getElementById(`buzz-ind-${idx}`).classList.add('active');
  document.getElementById(`buzz-btn-${idx}`).style.background = hexToRgba(t.color, 0.25);
  document.getElementById(`buzz-btn-${idx}`).style.boxShadow = `0 0 20px ${hexToRgba(t.color, 0.4)}`;

  document.getElementById('buzzStatus').textContent = `⚡ ${t.name} buzzed in!`;
  document.getElementById('buzzStatus').classList.add('active');
  document.getElementById('buzzStatus').style.color = t.color;

  enableBuzzButtons(false);
  setControlRow('buzzed');

  const panel = document.getElementById(`panel-${idx}`);
  panel.classList.add(idx === 0 ? 'buzzed' : 'buzzed-pink');
  setTimeout(() => panel.classList.remove('buzzed','buzzed-pink'), 600);

  showToast(`${t.name} buzzed!`, t.color === '#00f5d4' ? 'cyan' : t.color === '#ff2d78' ? 'pink' : 'yellow');
}

function revealAnswer() {
  answerRevealed = true;
  document.getElementById('answerReveal').classList.add('visible');
  setControlRow('scoring');
}

function awardPoints(correct) {
  if (scoringDone) return;
  scoringDone = true;
  clearInterval(timerInterval);

  const q = questions[qIndex];
  const target = buzzedTeam !== null ? buzzedTeam : null;

  if (target !== null) {
    if (correct) {
      teams[target].score += q.pts;
      updateScoreDisplay(target);
      showToast(`+${q.pts}`, 'cyan');
    } else {
      teams[target].score -= Math.round(q.pts/2);
      updateScoreDisplay(target);
      showToast(`-${Math.round(q.pts/2)}`, 'pink');
    }
  }

  if (!answerRevealed) revealAnswer();
  setControlRow('next');
}

function skipQuestion() {
  clearInterval(timerInterval);
  scoringDone = true;
  if (!answerRevealed) revealAnswer();
  setControlRow('next');
}

function nextQuestion() {
  qIndex++;
  loadQuestion();
}

function setControlRow(state) {
  const row = document.getElementById('controlRow');
  if (state === 'waiting') {
    row.innerHTML = `
      <button class="ctrl-btn reveal-q" onclick="revealAnswer()">👁 Reveal Answer</button>
      <button class="ctrl-btn skip-q" onclick="skipQuestion()">Skip →</button>`;
  } else if (state === 'buzzed') {
    row.innerHTML = `
      <button class="ctrl-btn reveal-q" onclick="revealAnswer()">👁 Reveal Answer</button>
      <button class="ctrl-btn correct" onclick="awardPoints(true)">✓ Correct</button>
      <button class="ctrl-btn incorrect" onclick="awardPoints(false)">✗ Wrong</button>`;
  } else if (state === 'timeup') {
    row.innerHTML = `
      <button class="ctrl-btn reveal-q" onclick="revealAnswer()">👁 Reveal Answer</button>
      <button class="ctrl-btn skip-q" onclick="skipQuestion()">Skip →</button>`;
  } else if (state === 'scoring') {
    if (buzzedTeam !== null) {
      row.innerHTML = `
        <button class="ctrl-btn correct" onclick="awardPoints(true)">✓ Correct</button>
        <button class="ctrl-btn incorrect" onclick="awardPoints(false)">✗ Wrong</button>`;
    } else {
      row.innerHTML = `<button class="ctrl-btn next-q" onclick="nextQuestion()">Next Question →</button>`;
    }
  } else if (state === 'next') {
    const isLast = qIndex >= questions.length - 1;
    row.innerHTML = `<button class="ctrl-btn next-q" onclick="${isLast ? 'endGame()' : 'nextQuestion()'}">${isLast ? '🏆 See Final Scores' : 'Next Question →'}</button>`;
  }
}

function updateScoreDisplay(idx) {
  const el = document.getElementById(`score-${idx}`);
  if (el) el.textContent = teams[idx].score.toLocaleString();
}

function enableBuzzButtons(enabled) {
  teams.forEach((_, i) => {
    const btn = document.getElementById(`buzz-btn-${i}`);
    if (btn) btn.disabled = !enabled;
  });
}

function resetBuzzIndicators() {
  teams.forEach((t, i) => {
    const ind = document.getElementById(`buzz-ind-${i}`);
    if (ind) ind.classList.remove('active');
    const btn = document.getElementById(`buzz-btn-${i}`);
    if (btn) {
      btn.style.background = hexToRgba(t.color, 0.08);
      btn.style.boxShadow = '';
    }
    document.getElementById('buzzStatus').style.color = '';
  });
}

function endGame() {
  clearInterval(timerInterval);
  const sorted = [...teams].sort((a,b) => b.score - a.score);
  buildPodium(sorted);
  showScreen('endScreen');
}

function buildPodium(sorted) {
  const podium = document.getElementById('podium');
  podium.innerHTML = '';
  const heights = [120, 80, 60, 50];
  const medals = ['🥇','🥈','🥉','4️⃣'];
  sorted.forEach((t, i) => {
    const place = document.createElement('div');
    place.className = 'podium-place';
    place.innerHTML = `
      <div class="podium-name" style="color:${t.color}">${t.name}</div>
      <div class="podium-pts" style="color:${t.color}">${t.score.toLocaleString()} pts</div>
      <div class="podium-block" style="height:${heights[i]||40}px;background:${hexToRgba(t.color,0.15)};border:1px solid ${hexToRgba(t.color,0.4)}">${medals[i]||''}</div>`;
    podium.appendChild(place);
  });
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 2000);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goSetup() {
  showScreen('setupScreen');
}

// Keyboard handlers
document.addEventListener('keydown', (e) => {
  if (document.getElementById('gameScreen').classList.contains('active')) {
    const key = e.key.toLowerCase();
    teams.forEach((t, i) => {
      if (key === t.key) teamBuzz(i);
    });
  }
});
</script>
</body>
