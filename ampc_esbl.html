<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rx Jeopardy — AMR Gram-Negative Infections</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a0f1e;
    --navy-mid: #111827;
    --navy-light: #1e2a3a;
    --gold: #e8c84a;
    --gold-dim: #b89d38;
    --gold-light: #f5e180;
    --teal: #2dd4bf;
    --red: #f87171;
    --green: #4ade80;
    --text: #e8e4d9;
    --text-dim: #8a9bb0;
    --border: rgba(232, 200, 74, 0.18);
    --glow: 0 0 24px rgba(232, 200, 74, 0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(45, 212, 191, 0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(232, 200, 74, 0.06) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 2rem 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  header::before {
    content: '';
    position: absolute;
    bottom: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .game-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dim) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
    text-shadow: none;
  }
  .game-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 0.4rem;
  }

  /* SCOREBOARD */
  .scoreboard {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2rem;
    padding: 1.2rem 2rem;
    background: var(--navy-mid);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .score-display {
    text-align: center;
  }
  .score-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }
  .score-value {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }
  .score-divider { width: 1px; height: 40px; background: var(--border); }
  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.4rem 1.2rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn-reset:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  /* BOARD */
  .board-container {
    padding: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
    overflow-x: auto;
  }
  .board {
    display: grid;
    gap: 8px;
    min-width: 700px;
  }
  .category-headers {
    display: grid;
    gap: 8px;
  }
  .category-header {
    background: var(--gold);
    color: var(--navy);
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 0.75rem;
    text-align: center;
    padding: 0.7rem 0.5rem;
    border-radius: 4px;
    letter-spacing: 0.04em;
    line-height: 1.3;
    text-transform: uppercase;
  }
  .questions-grid {
    display: grid;
    gap: 8px;
  }
  .q-row {
    display: grid;
    gap: 8px;
  }

  /* QUESTION TILES */
  .tile {
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    min-height: 72px;
    aspect-ratio: unset;
  }
  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(232,200,74,0.05));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .tile:hover:not(.used) {
    border-color: var(--gold-dim);
    transform: translateY(-2px);
    box-shadow: var(--glow), 0 8px 24px rgba(0,0,0,0.4);
  }
  .tile:hover:not(.used)::before { opacity: 1; }
  .tile-value {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: var(--gold);
    font-size: 1.4rem;
    text-shadow: 0 0 20px rgba(232,200,74,0.4);
  }
  .tile.used {
    background: rgba(255,255,255,0.02);
    border-color: rgba(255,255,255,0.04);
    cursor: default;
  }
  .tile.used .tile-value { opacity: 0; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 8, 18, 0.92);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    transform: translateY(20px);
    transition: transform 0.3s;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7), var(--glow);
  }
  .modal-overlay.active .modal {
    transform: translateY(0);
  }
  .modal-header {
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
  }
  .modal-meta {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .modal-category {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--teal);
  }
  .modal-points {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }
  .modal-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }
  .modal-body { padding: 1.5rem; }
  .question-text {
    font-size: 1.1rem;
    line-height: 1.7;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 1.5rem;
  }
  .reveal-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
    color: var(--navy);
    border: none;
    padding: 0.9rem 2rem;
    border-radius: 6px;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .reveal-btn:hover {
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
    box-shadow: 0 4px 20px rgba(232,200,74,0.35);
    transform: translateY(-1px);
  }
  .answer-section {
    display: none;
    margin-top: 1.5rem;
    animation: slideIn 0.3s ease;
  }
  .answer-section.visible { display: block; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .answer-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 0.5rem;
  }
  .answer-text {
    background: rgba(232, 200, 74, 0.06);
    border: 1px solid rgba(232, 200, 74, 0.2);
    border-radius: 6px;
    padding: 1rem 1.2rem;
    font-size: 1rem;
    line-height: 1.6;
    color: var(--gold-light);
    font-weight: 500;
    margin-bottom: 1rem;
  }
  .explanation-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }
  .explanation-text {
    font-size: 0.88rem;
    line-height: 1.65;
    color: var(--text-dim);
    margin-bottom: 1rem;
  }
  .reference-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: rgba(138,155,176,0.6);
    font-style: italic;
    border-top: 1px solid var(--border);
    padding-top: 0.8rem;
    margin-bottom: 1.2rem;
  }
  .score-btns {
    display: flex;
    gap: 0.75rem;
    margin-top: 0.5rem;
  }
  .score-btn {
    flex: 1;
    padding: 0.7rem;
    border-radius: 6px;
    border: 1px solid;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.2s;
    font-weight: 500;
  }
  .score-btn.correct {
    background: rgba(74, 222, 128, 0.08);
    border-color: rgba(74, 222, 128, 0.3);
    color: var(--green);
  }
  .score-btn.correct:hover {
    background: rgba(74, 222, 128, 0.18);
    box-shadow: 0 0 16px rgba(74,222,128,0.15);
  }
  .score-btn.incorrect {
    background: rgba(248, 113, 113, 0.08);
    border-color: rgba(248, 113, 113, 0.3);
    color: var(--red);
  }
  .score-btn.incorrect:hover {
    background: rgba(248, 113, 113, 0.18);
    box-shadow: 0 0 16px rgba(248,113,113,0.15);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.positive { border-color: rgba(74,222,128,0.4); color: var(--green); }
  .toast.negative { border-color: rgba(248,113,113,0.4); color: var(--red); }

  /* PROGRESS */
  .progress-bar-wrap {
    height: 3px;
    background: rgba(255,255,255,0.05);
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--gold));
    transition: width 0.4s ease;
  }

  em { font-style: italic; color: var(--teal); }

  @media (max-width: 600px) {
    .tile-value { font-size: 1rem; }
    .modal-points { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="game-title">Rx Jeopardy</div>
  <div class="game-subtitle">AMR Gram-Negative Infections · PGY1 Pharmacy Resident Series</div>
</header>

<div class="scoreboard">
  <div class="score-display">
    <div class="score-label">Score</div>
    <div class="score-value" id="scoreDisplay">$0</div>
  </div>
  <div class="score-divider"></div>
  <div class="score-display">
    <div class="score-label">Correct</div>
    <div class="score-value" id="correctDisplay" style="color:var(--green)">0</div>
  </div>
  <div class="score-divider"></div>
  <div class="score-display">
    <div class="score-label">Attempted</div>
    <div class="score-value" id="attemptDisplay" style="color:var(--text-dim)">0</div>
  </div>
  <div class="score-divider"></div>
  <div class="score-display">
    <div class="score-label">Remaining</div>
    <div class="score-value" id="remainDisplay" style="color:var(--teal)">25</div>
  </div>
  <div class="score-divider"></div>
  <button class="btn-reset" onclick="resetGame()">↺ Reset</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
</div>

<div class="board-container">
  <div class="board" id="gameBoard"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-meta">
        <div class="modal-category" id="modalCategory">Category</div>
        <div class="modal-points" id="modalPoints">$200</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="question-text" id="modalQuestion"></div>
      <button class="reveal-btn" id="revealBtn" onclick="revealAnswer()">Reveal Answer</button>
      <div class="answer-section" id="answerSection">
        <div class="answer-label">Answer</div>
        <div class="answer-text" id="modalAnswer"></div>
        <div class="explanation-label">Explanation</div>
        <div class="explanation-text" id="modalExplanation"></div>
        <div class="reference-text" id="modalReference"></div>
        <div class="score-btns">
          <button class="score-btn correct" onclick="scoreQuestion(true)">✓ Correct</button>
          <button class="score-btn incorrect" onclick="scoreQuestion(false)">✗ Incorrect</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const questions = [
  {
    id: 1, category: "Resistance\nMechanisms", points: 200,
    question: "What is the key phenotypic difference that distinguishes AmpC β-lactamases from ESBLs in terms of susceptibility to β-lactamase inhibitors?",
    answer: "AmpC β-lactamases are NOT inhibited by clavulanic acid or tazobactam, whereas ESBLs ARE inhibited by these β-lactamase inhibitors.",
    explanation: "This phenotypic distinction is clinically important for laboratory differentiation. AmpC enzymes also resist cephamycins (e.g., cefoxitin), unlike ESBLs.",
    ref: "Macesic et al., Lancet 2025; IDSA 2023/2024 Guidance"
  },
  {
    id: 2, category: "Clinical\nTrials", points: 200,
    question: "In the MERINO trial comparing piperacillin-tazobactam to meropenem for ESBL-producing Enterobacterales bloodstream infections, which agent had lower 30-day mortality?",
    answer: "Meropenem (4% mortality vs 12% with piperacillin-tazobactam)",
    explanation: "This landmark trial established carbapenems as preferred therapy for ESBL-E bloodstream infections, even after reanalysis using revised MIC criteria.",
    ref: "IDSA 2023 Guidance on AMR Gram-Negative Infections"
  },
  {
    id: 3, category: "Organism\nIdentification", points: 200,
    question: "Name three Enterobacterales species at MODERATE to HIGH risk for clinically significant AmpC production due to inducible ampC gene expression.",
    answer: "<em>Enterobacter cloacae</em> complex, <em>Klebsiella aerogenes</em>, and <em>Citrobacter freundii</em>",
    explanation: "These organisms can develop resistance to third-generation cephalosporins during therapy through ampC induction, even if initially susceptible.",
    ref: "IDSA 2023/2024 Guidance; Macesic et al., Lancet 2025"
  },
  {
    id: 4, category: "Pharmacology", points: 200,
    question: "Why is cefepime generally effective against AmpC-producing Enterobacterales despite their resistance to third-generation cephalosporins?",
    answer: "Cefepime is both a weak inducer of ampC AND forms stable acyl enzyme complexes that resist hydrolysis by AmpC β-lactamases.",
    explanation: "This dual property makes cefepime a preferred agent for AmpC-producing organisms.",
    ref: "IDSA 2024 Guidance on AMR Gram-Negative Infections"
  },
  {
    id: 5, category: "Antimicrobial\nStewardship", points: 200,
    question: "For ESBL-producing <em>E. coli</em> urinary tract infections, name three preferred oral step-down options after clinical improvement (assuming susceptibility).",
    answer: "Trimethoprim-sulfamethoxazole (TMP-SMX), ciprofloxacin, or levofloxacin",
    explanation: "These agents achieve adequate urinary concentrations and allow carbapenem-sparing strategies after hemodynamic stability is achieved.",
    ref: "IDSA 2023/2024 Guidance on AMR Gram-Negative Infections"
  },
  {
    id: 6, category: "Resistance\nMechanisms", points: 400,
    question: "What are the three mechanisms by which Enterobacterales can exhibit increased AmpC β-lactamase production?",
    answer: "(1) Inducible chromosomal gene expression, (2) Stable chromosomal gene derepression, (3) Constitutively expressed ampC genes (plasmid-mediated or chromosomally integrated)",
    explanation: "Understanding these mechanisms helps predict which organisms are at risk for developing resistance during therapy and guides antibiotic selection.",
    ref: "IDSA 2023/2024 Guidance on AMR Gram-Negative Infections"
  },
  {
    id: 7, category: "Drug\nSpectrum", points: 400,
    question: "Which third-generation cephalosporins are at risk for inducing AmpC resistance in organisms like <em>Enterobacter cloacae</em>?",
    answer: "Ceftriaxone, cefotaxime, and ceftazidime",
    explanation: "These agents are relatively weak ampC inducers but are susceptible to hydrolysis, making them less effective for organisms at moderate risk for clinically significant AmpC production.",
    ref: "IDSA 2024 Guidance on AMR Gram-Negative Infections"
  },
  {
    id: 8, category: "Novel BL/BLI\nCombinations", points: 400,
    question: "Name three newer β-lactam/β-lactamase inhibitor combinations with activity against ESBL-producing Enterobacterales.",
    answer: "Ceftazidime-avibactam, meropenem-vaborbactam, and imipenem-cilastatin-relebactam",
    explanation: "These agents should be preferentially reserved for carbapenem-resistant organisms, but may be needed for polymicrobial infections or drug intolerances.",
    ref: "IDSA 2023 Guidance on AMR Gram-Negative Infections"
  },
  {
    id: 9, category: "Urinary Tract\nInfections", points: 400,
    question: "What are the preferred treatment options for uncomplicated cystitis caused by AmpC-producing Enterobacterales?",
    answer: "Nitrofurantoin or trimethoprim-sulfamethoxazole (TMP-SMX)",
    explanation: "Ciprofloxacin, levofloxacin, or a single IV dose of aminoglycoside are alternative options.",
    ref: "IDSA 2023/2024 Guidance on AMR Gram-Negative Infections"
  },
  {
    id: 10, category: "Epidemiology", points: 400,
    question: "What is the approximate prevalence of ESBL-producing Enterobacterales in the United States?",
    answer: "11–13%",
    explanation: "ESBL rates vary globally: 5–25% in western Europe, >50% in southern/eastern Europe, 30–80% in Asia, and 10–15% in Australia/New Zealand.",
    ref: "Macesic et al., Lancet 2025"
  },
  {
    id: 11, category: "Clinical\nVignette", points: 600,
    question: "A patient with <em>Enterobacter cloacae</em> bacteremia is started on ceftriaxone based on initial susceptibility. Three days later, repeat cultures show resistance to ceftriaxone. What resistance mechanism is most likely responsible?",
    answer: "Inducible AmpC β-lactamase expression",
    explanation: "<em>E. cloacae</em> can develop resistance to third-generation cephalosporins during therapy through ampC induction, even if initially susceptible. This can occur after just a few doses.",
    ref: "IDSA 2023/2024 Guidance on AMR Gram-Negative Infections"
  },
  {
    id: 12, category: "Pharmacology/\nPK-PD", points: 600,
    question: "Why is ceftolozane-tazobactam potentially more effective than piperacillin-tazobactam against ESBL-producing Enterobacterales?",
    answer: "Ceftolozane has greater intrinsic stability to ESBL hydrolysis (e.g., CTX-M-15), is less reliant on tazobactam inhibition, AND the 2:1 ratio provides higher tazobactam concentrations compared to pip-tazo's 8:1 ratio.",
    explanation: "These pharmacologic advantages make ceftolozane-tazobactam more potent against ESBL-E, with MICs several dilutions lower than piperacillin-tazobactam.",
    ref: "IDSA 2024 Guidance on AMR Gram-Negative Infections"
  },
  {
    id: 13, category: "Guideline\nRecs", points: 600,
    question: "According to IDSA guidance, what is the preferred antibiotic class for ESBL-producing Enterobacterales bloodstream infections?",
    answer: "Carbapenems (meropenem, imipenem-cilastatin, or ertapenem*) — *Ertapenem should be limited to patients with normal serum albumin who are not critically ill.",
    explanation: "Carbapenems remain the gold standard for ESBL-E BSI based on randomized trial evidence (MERINO).",
    ref: "IDSA 2023 Guidance on AMR Gram-Negative Infections"
  },
  {
    id: 14, category: "Microbiology\nInterpretation", points: 600,
    question: "An <em>E. coli</em> isolate from a bloodstream infection is resistant to ceftriaxone but susceptible to cefoxitin and piperacillin-tazobactam. Is this more likely an ESBL or AmpC producer?",
    answer: "ESBL producer",
    explanation: "ESBLs remain susceptible to cephamycins (cefoxitin) and β-lactamase inhibitors, whereas AmpC producers are resistant to both.",
    ref: "Macesic et al., Lancet 2025"
  },
  {
    id: 15, category: "Antimicrobial\nStewardship", points: 600,
    question: "True or False: Newer agents like ceftazidime-avibactam should be used as first-line therapy for all ESBL-producing Enterobacterales infections to preserve carbapenems.",
    answer: "FALSE",
    explanation: "IDSA guidance suggests these agents be preferentially reserved for carbapenem-resistant organisms. Carbapenems remain preferred for ESBL-E infections.",
    ref: "IDSA 2023 Guidance on AMR Gram-Negative Infections"
  },
  {
    id: 16, category: "Ertapenem\nLimitations", points: 800,
    question: "Why is ertapenem NOT recommended for critically ill patients or those with hypoalbuminemia when treating ESBL-producing Enterobacterales?",
    answer: "Ertapenem is highly protein-bound (~95%). In hypoalbuminemia, increased free fraction leads to increased clearance and decreased serum half-life, suboptimal with once-daily dosing.",
    explanation: "An observational study found hypoalbuminemia (albumin <2.5 g/dL) was associated with ~5× higher odds of 30-day mortality with ertapenem vs meropenem or imipenem-cilastatin.",
    ref: "IDSA 2024 Guidance on AMR Gram-Negative Infections"
  },
  {

// Organize by category
const categoryOrder = [
  "Resistance\nMechanisms",
  "Clinical\nTrials",
  "Organism\nIdentification",
  "Pharmacology",
  "Antimicrobial\nStewardship"
];

// Build 5 categories × 5 point levels
const pointLevels = [200, 400, 600, 800, 1000];

// Map questions to a grid: categorize & level
function buildGrid() {
  // 5 columns, one per category; 5 rows by point value
  // We'll use a flat list of 25 questions, distributed evenly
  const grid = Array.from({length: 5}, () => Array(5).fill(null));
  
  // Category mapping
  const catMap = {
    "Resistance\nMechanisms": 0,
    "Clinical\nTrials": 1,
    "Organism\nIdentification": 2,
    "Pharmacology": 3,
    "Antimicrobial\nStewardship": 4
  };
  
  // Just lay them out sequentially: cols 0-4 as categories, rows 0-4 as point tiers
  // Since we have 25 questions across varying categories, we'll arrange by point tier
  const byPoints = {};
  pointLevels.forEach(p => byPoints[p] = []);
  questions.forEach(q => byPoints[q.points].push(q));
  
  // Fill grid row by row
  const result = [];
  pointLevels.forEach((pts, row) => {
    const rowQs = byPoints[pts];
    result.push(rowQs);
  });
  return result;
}

// State
let score = 0;
let correct = 0;
let attempted = 0;
let usedTiles = new Set();
let currentQ = null;
let scoredCurrentQ = false;

// Build board
function buildBoard() {
  const board = document.getElementById('gameBoard');
  const grid = buildGrid();
  
  // Get unique categories for headers
  const cats = ["Resistance\nMechanisms", "Clinical Trials", "Organism ID", "Pharmacology", "AMS"];
  
  // We have 5 rows × 5 cols = 25 questions
  // Determine columns from first row
  const colCount = grid[0].length;
  
  // Category headers
  const catHeaders = document.createElement('div');
  catHeaders.className = 'category-headers';
  catHeaders.style.gridTemplateColumns = `repeat(${colCount}, 1fr)`;
  
  // Gather category names from q's in each column
  grid[0].forEach((q, ci) => {
    const hdr = document.createElement('div');
    hdr.className = 'category-header';
    hdr.textContent = q.category.replace('\n', ' ');
    catHeaders.appendChild(hdr);
  });
  board.appendChild(catHeaders);
  
  // Rows
  const qGrid = document.createElement('div');
  qGrid.className = 'questions-grid';
  
  grid.forEach((row, ri) => {
    const rowEl = document.createElement('div');
    rowEl.className = 'q-row';
    rowEl.style.gridTemplateColumns = `repeat(${colCount}, 1fr)`;
    row.forEach((q, ci) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${q.id}`;
      tile.innerHTML = `<span class="tile-value">$${q.points}</span>`;
      tile.onclick = () => openQuestion(q);
      rowEl.appendChild(tile);
    });
    qGrid.appendChild(rowEl);
  });
  
  board.appendChild(qGrid);
  updateProgress();
}

function openQuestion(q) {
  if (usedTiles.has(q.id)) return;
  currentQ = q;
  scoredCurrentQ = false;
  
  document.getElementById('modalCategory').textContent = q.category.replace('\n', ' — ');
  document.getElementById('modalPoints').textContent = `$${q.points}`;
  document.getElementById('modalQuestion').innerHTML = q.question;
  document.getElementById('modalAnswer').innerHTML = q.answer;
  document.getElementById('modalExplanation').innerHTML = q.explanation;
  document.getElementById('modalReference').textContent = `Ref: ${q.ref}`;
  
  document.getElementById('answerSection').classList.remove('visible');
  document.getElementById('revealBtn').style.display = 'block';
  
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  if (currentQ && !scoredCurrentQ) {
    markUsed(currentQ.id);
  }
  currentQ = null;
}

function revealAnswer() {
  document.getElementById('answerSection').classList.add('visible');
  document.getElementById('revealBtn').style.display = 'none';
}

function scoreQuestion(isCorrect) {
  if (scoredCurrentQ) return;
  scoredCurrentQ = true;
  
  const pts = currentQ.points;
  if (isCorrect) {
    score += pts;
    correct++;
    showToast(`+$${pts}`, 'positive');
  } else {
    score -= pts;
    showToast(`-$${pts}`, 'negative');
  }
  attempted++;
  
  markUsed(currentQ.id);
  updateScores();
  
  setTimeout(closeModal, 400);
}

function markUsed(id) {
  usedTiles.add(id);
  const tile = document.getElementById(`tile-${id}`);
  if (tile) tile.classList.add('used');
  updateProgress();
}

function updateScores() {
  document.getElementById('scoreDisplay').textContent = (score >= 0 ? '$' : '-$') + Math.abs(score).toLocaleString();
  document.getElementById('correctDisplay').textContent = correct;
  document.getElementById('attemptDisplay').textContent = attempted;
  document.getElementById('remainDisplay').textContent = 25 - usedTiles.size;
}

function updateProgress() {
  const pct = (usedTiles.size / 25) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('remainDisplay').textContent = 25 - usedTiles.size;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 2200);
}

function resetGame() {
  score = 0; correct = 0; attempted = 0;
  usedTiles.clear();
  document.querySelectorAll('.tile').forEach(t => t.classList.remove('used'));
  document.querySelectorAll('.tile-value').forEach(v => v.style.opacity = '');
  updateScores();
  updateProgress();
}

// Close on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

buildBoard();
</script>
